<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한예수교장로회 성인교회</title>
    <style>
        /* 기본 스타일 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; color: #333; line-height: 1.6; background-color: #fcfcfc; }
        a { text-decoration: none; color: inherit; }

        /* 상단 헤더 (로고 및 메뉴) */
        header {
            background-color: #ffffff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { 
            text-align: left; 
            display: flex;
            align-items: center;
        }
        
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 30px; font-weight: bold; color: #555; }
        nav ul li a:hover { color: #3498db; }

        /* 메인 비주얼 (PC 버전 기본 설정 - background.png) */
        .hero {
            background: url('background.png') no-repeat center center/cover;
            width: 100%;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease;
        }

        /* 📱 모바일 화면 자동 전환 설정 (backgroundmobile.png) */
        @media (max-width: 768px) {
            .hero {
                background: url('backgroundmobile.png') no-repeat center center/cover;
                height: 500px;
            }
        }

        /* 공통 섹션 스타일 */
        section { padding: 80px 20px; max-width: 900px; margin: 0 auto; text-align: center; }
        section h2 { font-size: 28px; color: #2c3e50; margin-bottom: 30px; position: relative; padding-bottom: 10px; }
        section h2::after { content: ''; display: block; width: 50px; height: 2px; background-color: #3498db; margin: 10px auto 0; }
        .content-box { background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: left; }

        /* 예배안내 표 스타일 */
        .timetable { width: 100%; border-collapse: collapse; margin-top: 20px; }
