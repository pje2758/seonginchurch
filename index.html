<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한예수교장로회 성인교회</title>
    <style>
        /* 1. 기본 스타일 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #333; line-height: 1.6; background-color: #fcfcfc; }
        a { text-decoration: none; color: inherit; }

        /* 2. 상단 헤더 */
        header {
            background-color: #ffffff;
            padding: 10px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { 
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 80px;
            display: block;
        }
        
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 30px; font-weight: bold; color: #444; font-size: 17px; white-space: nowrap; }
        nav ul li a:hover { color: #3498db; }

        /* 3. 메인 비주얼 (기본값: PC 전체화면용 - backgroundwhole.png) */
        .hero {
            background: url('backgroundwhole.png') no-repeat center center/cover;
            width: 100%;
            height: 600px; /* 전체화면 시 시원하게 보일 높이 */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease;
        }

        /* 💻 화면 폭이 중간으로 줄어들었을 때 (스플릿 뷰 / 태블릿 - background.png) */
        @media (max-width: 1200px) {
            .hero {
                background: url('background.png') no-repeat center center/cover;
                height: 550px;
            }
        }

        /* 📱 화면 폭이 아주 좁을 때 (모바일 - backgroundmobile.png) */
        @media (max-width: 768px) {
            header {
                padding: 10px 10px;
            }
            .logo img {
                height: 50px;
            }
            nav ul li {
                margin-left: 12px;
                font-size: 14px;
            }
            .hero {
                background: url('backgroundmobile.png') no-repeat center center/cover;
                height: 480px;
            }
        }

        /* 4. 본문 섹션 스타일 */
        section { padding: 80px 20px; max-width: 900px; margin: 0 auto; text-align: center; }
        section h2 { font-size: 28px; color: #2c3e50; margin-bottom: 30px; position: relative; padding-bottom: 10px; }
        section h2::after { content: ''; display: block; width: 50px; height: 2px; background-color: #3498db; margin: 10px auto 0; }
        .content-box { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: left; }
